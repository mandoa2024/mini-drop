services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drop
      POSTGRES_PASSWORD: drop
      POSTGRES_DB: drop
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drop -d drop"]
      interval: 3s
      timeout: 3s
      retries: 20

  analyzer:
    build: ./analyzer
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://drop:drop@postgres:5432/drop
      ANALYZER_URL: http://analyzer:8090
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build: ./agent
    environment:
      SERVER_URL: http://server:8080
      AGENT_ID: demo-agent
      AGENT_NAME: demo-agent
      AGENT_POLL_SECONDS: 2
      HEARTBEAT_SECONDS: 5
      DEMO_MODE: "false"
    depends_on:
      server:
        condition: service_healthy
    pid: host
    privileged: true
    volumes:
      - demo-runtime:/runtime:ro

  workload:
    build:
      context: .
      dockerfile: examples/Dockerfile
    pid: host
    restart: unless-stopped
    volumes:
      - demo-runtime:/runtime

  python-workload:
    build:
      context: .
      dockerfile: examples/Python.Dockerfile
    pid: host
    restart: unless-stopped
    volumes:
      - demo-runtime:/runtime

  demo:
    build: ./server
    working_dir: /app
    command: ["python", "scripts/demo.py"]
    environment:
      BASE_URL: http://server:8080
      PID_FILE: /runtime/workload.pid
      DEMO_DURATION_SECONDS: 5
    volumes:
      - ./scripts:/app/scripts:ro
      - demo-runtime:/runtime:ro
    depends_on:
      server:
        condition: service_healthy
      agent:
        condition: service_started
      workload:
        condition: service_started
    restart: "no"

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
  demo-runtime:
